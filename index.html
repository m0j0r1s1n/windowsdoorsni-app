<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windows&DoorsNI – Management Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

  <div id="app-shell">
    <header>
      <div class="header-inner">
        <div class="logo">
          <span class="logo-text">Windows&DoorsNI<span> Portal</span></span>
        </div>
        <nav class="tab-nav">
          <button class="tab-btn active" onclick="showPage('dashboard', this)">Dashboard</button>
          <button class="tab-btn" onclick="showPage('jobs', this)">Job List</button>
          <button class="tab-btn" onclick="showPage('stock', this)">Stock</button>
          <button class="tab-btn" onclick="showPage('routes', this)">Routes</button>
        </nav>
        <div class="header-right">
          <span id="sync-status" class="sync-status">● Synced</span>
          <button id="theme-btn" onclick="toggleTheme()">☀️</button>
        </div>
      </div>
    </header>

    <main>
      <section id="dashboard" class="tab-content active">
        <div class="section-header"><h1>Performance</h1></div>
        <div id="kpi-row" class="kpi-grid"></div>
        <div class="form-card">
          <h2 class="form-title">Quick Add Job</h2>
          <form id="quick-job-form" onsubmit="quickAddJob(event)">
            <div class="form-grid">
              <div class="form-group">
                <label>Customer Name</label>
                <input type="text" id="q-customer" placeholder="John Smith" required />
              </div>
              <div class="form-group">
                <label>Address</label>
                <input type="text" id="q-address" placeholder="12 Main St, Belfast" required />
              </div>
              <div class="form-group">
                <label>Price (£)</label>
                <input type="number" id="q-price" placeholder="0.00" step="0.01" min="0" />
              </div>
              <div class="form-group">
                <label>Status</label>
                <select id="q-status">
                  <option>Pending</option>
                  <option>Booked</option>
                  <option>Complete</option>
                  <option>Paid</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn-primary">Add Job</button>
          </form>
        </div>
      </section>

      <section id="jobs" class="tab-content">
        <div class="section-header"><h1>Job List</h1></div>
        <div class="form-card">
          <h2 class="form-title">Add New Job</h2>
          <form id="job-form" onsubmit="addJob(event)">
            <div class="form-grid">
              <div class="form-group">
                <label>Customer Name</label>
                <input type="text" id="job-customer" placeholder="John Smith" required />
              </div>
              <div class="form-group">
                <label>Address</label>
                <input type="text" id="job-address" placeholder="12 Main St, Belfast" required />
              </div>
              <div class="form-group">
                <label>Job Type</label>
                <select id="job-type">
                  <option>Window</option>
                  <option>Door</option>
                  <option>Both</option>
                </select>
              </div>
              <div class="form-group">
                <label>Price (£)</label>
                <input type="number" id="job-price" placeholder="0.00" step="0.01" min="0" />
              </div>
              <div class="form-group">
                <label>Status</label>
                <select id="job-status">
                  <option>Pending</option>
                  <option>Booked</option>
                  <option>Complete</option>
                  <option>Paid</option>
                </select>
              </div>
              <div class="form-group">
                <label>Date</label>
                <input type="date" id="job-date" />
              </div>
            </div>
            <button type="submit" class="btn-primary">Add Job</button>
          </form>
        </div>
        <div id="jobs-table-wrap"></div>
      </section>

      <section id="stock" class="tab-content">
        <div class="section-header"><h1>Stock</h1></div>
        <div class="form-card">
          <h2 class="form-title">Add Stock Item</h2>
          <form id="stock-form" onsubmit="addStockItem(event)">
            <div class="form-grid">
              <div class="form-group">
                <label>Item Name</label>
                <input type="text" id="stock-name" placeholder="uPVC Frame 1200mm" required />
              </div>
              <div class="form-group">
                <label>Category</label>
                <input type="text" id="stock-category" placeholder="Frames" />
              </div>
              <div class="form-group">
                <label>Quantity</label>
                <input type="number" id="stock-qty" placeholder="0" min="0" required />
              </div>
              <div class="form-group">
                <label>Minimum Qty</label>
                <input type="number" id="stock-min" placeholder="0" min="0" />
              </div>
            </div>
            <button type="submit" class="btn-primary">Add Item</button>
          </form>
        </div>
        <div id="stock-table-wrap"></div>
      </section>

      <section id="routes" class="tab-content">
        <div class="section-header"><h1>Daily Route</h1></div>

        <!-- Add Stop form -->
        <div class="form-card">
          <h2 class="form-title">Add Route Stop</h2>
          <form id="route-form" onsubmit="addRouteStop(event)">
            <div class="form-grid">
              <div class="form-group" style="grid-column: 1 / -1;">
                <label>Address</label>
                <input type="text" id="route-address" placeholder="BT1 1AA or 45 Shore Rd, Newtownabbey" required />
              </div>
              <div class="form-group">
                <label>Job Reference</label>
                <input type="text" id="route-job-ref" placeholder="Optional" />
              </div>
              <div class="form-group">
                <label>Time Slot</label>
                <input type="time" id="route-time" />
              </div>
            </div>
            <div style="display:flex; gap:0.75rem; flex-wrap:wrap;">
              <button type="submit" class="btn-primary">Add Stop</button>
              <button type="button" class="btn-secondary" onclick="clearRoute()">Clear Route</button>
            </div>
          </form>
        </div>

        <!-- Route planner + Fuel calc side-by-side -->
        <div class="route-panels">

          <!-- Stop list -->
          <div class="form-card route-stops-panel">
            <h2 class="form-title">Route Plan</h2>
            <div id="stop-list"><p class="empty-state">No stops added yet.</p></div>
            <div id="route-summary" class="route-summary" style="display:none;">
              <div class="route-stat"><span class="route-stat-label">Total Distance</span><span id="rt-distance" class="route-stat-value">0 km</span></div>
              <div class="route-stat"><span class="route-stat-label">Est. Drive Time</span><span id="rt-time" class="route-stat-value">0 min</span></div>
            </div>
          </div>

          <!-- Fuel calculator -->
          <div class="form-card fuel-panel">
            <h2 class="form-title">Fuel Calculator</h2>
            <div class="form-grid" style="grid-template-columns:1fr 1fr;">
              <div class="form-group">
                <label>Fuel Type</label>
                <select id="fuel-type" oninput="recalcFuel()">
                  <option value="petrol">Petrol</option>
                  <option value="diesel">Diesel</option>
                  <option value="electric">Electric (kWh)</option>
                </select>
              </div>
              <div class="form-group">
                <label id="fuel-price-label">Price per Litre (£)</label>
                <input type="number" id="fuel-price" value="1.45" step="0.01" min="0" oninput="recalcFuel()" />
              </div>
              <div class="form-group">
                <label id="fuel-efficiency-label">Vehicle MPG</label>
                <input type="number" id="fuel-mpg" value="40" step="1" min="1" oninput="recalcFuel()" />
              </div>
              <div class="form-group">
                <label>Return Trip?</label>
                <select id="fuel-return" oninput="recalcFuel()">
                  <option value="0">One Way</option>
                  <option value="1">Include Return</option>
                </select>
              </div>
            </div>
            <div class="fuel-results">
              <div class="fuel-result-row">
                <span class="fuel-result-label">Route Distance</span>
                <span id="fuel-km" class="fuel-result-value">— km</span>
              </div>
              <div class="fuel-result-row">
                <span class="fuel-result-label" id="fuel-used-label">Fuel Used</span>
                <span id="fuel-litres" class="fuel-result-value">— L</span>
              </div>
              <div class="fuel-result-row fuel-result-total">
                <span class="fuel-result-label">Est. Fuel Cost</span>
                <span id="fuel-cost" class="fuel-result-value">£—</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Map -->
        <div id="map-container" style="height: 420px; border-radius: 12px; margin-top: 1.25rem;"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
